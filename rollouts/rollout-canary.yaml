---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: myapp-rollout
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myapp-rollout
  template:
    metadata:
      labels:
        app: myapp-rollout
    spec:
      containers:
        - name: nginx
          image: nginx:1.28
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 80
  strategy:
    canary:
      stableService: myapp-stable
      canaryService: myapp-canary
      analysis:
        templates:
          - templateName: nginx-canary-analysis
        startingStep: 1
      steps:
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 75
        - pause: {duration: 30s}
        - setWeight: 100
