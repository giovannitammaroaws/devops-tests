name: SAST

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  precommit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  checkov:
    name: Checkov Kubernetes scan
    runs-on: ubuntu-latest
    needs: [precommit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: python -m pip install --upgrade pip checkov==3.2.431

      - name: Run Checkov (Kubernetes baseline for this lab)
        run: |
          checkov \
            --directory . \
            --framework kubernetes \
            --quiet \
            --skip-check CKV_K8S_21,CKV_K8S_40,CKV_K8S_43,CKV_K8S_10,CKV_K8S_11,CKV_K8S_12,CKV_K8S_13,CKV_K8S_8,CKV_K8S_9,CKV_K8S_15,CKV_K8S_38,CKV_K8S_25

  hadolint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    needs: [precommit]
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfiles
        id: dockerfiles
        shell: bash
        run: |
          if find . -type f \( -name "Dockerfile" -o -name "Dockerfile.*" -o -name "*.Dockerfile" \) | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Hadolint
        if: steps.dockerfiles.outputs.found == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning
          no-fail: true

      - name: Skip Hadolint (no Dockerfiles found)
        if: steps.dockerfiles.outputs.found != 'true'
        run: echo "No Dockerfiles found in repository. Skipping Hadolint."

  trivy:
    name: Trivy misconfiguration scan
    runs-on: ubuntu-latest
    needs: [precommit]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: misconfig
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
